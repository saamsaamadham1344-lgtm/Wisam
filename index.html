<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Xford AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: linear-gradient(90deg, #1a1a2e, #16213e);
    padding: 16px 24px;
    border-bottom: 1px solid #2a2a3e;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 22px;
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
  }
  h1 { font-size: 20px; }
  .subtitle { font-size: 12px; color: #888; }
  .status {
    margin-left: auto;
    font-size: 12px;
    color: #4ade80;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot {
    width: 8px; height: 8px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 80%;
    padding: 14px 18px;
    border-radius: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .user {
    align-self: flex-end;
    background: linear-gradient(135deg, #2a4a7f, #1e3a6f);
  }
  .bot {
    align-self: flex-start;
    background: #1a1a26;
    border-left: 3px solid #00d4ff;
  }
  .bot strong { color: #00d4ff; }
  .bot code {
    background: #0a0a0f;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Consolas', monospace;
    color: #7b2ff7;
  }
  .bot pre {
    background: #0a0a0f;
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    border: 1px solid #2a2a3e;
  }
  #inputArea {
    padding: 16px 24px;
    background: #15151f;
    border-top: 1px solid #2a2a3e;
    display: flex;
    gap: 10px;
  }
  #input {
    flex: 1;
    background: #0a0a0f;
    border: 1px solid #2a2a3e;
    color: #e0e0e0;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
  }
  #input:focus { border-color: #00d4ff; }
  button {
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    color: white;
    border: none;
    padding: 14px 26px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: transform 0.1s;
  }
  button:hover { transform: scale(1.03); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .typing {
    color: #888;
    font-style: italic;
  }
  #chat::-webkit-scrollbar { width: 8px; }
  #chat::-webkit-scrollbar-track { background: #0a0a0f; }
  #chat::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo">X</div>
  <div>
    <h1>Xford AI</h1>
    <div class="subtitle">Kod · Bilim · Güvenlik · Genel Bilgi</div>
  </div>
  <div class="status"><span class="dot"></span> Çevrimiçi</div>
</header>

<div id="chat">
  <div class="msg bot"><strong>Xford:</strong> Selam, ben Xford. Sana kod yazma, hata ayıklama, bilim, tarih, siber güvenlik konseptleri, matematik, dil öğrenme ve daha pek çok konuda yardım edebilirim. Sor bakalım, ne öğrenmek istiyorsun?</div>
</div>

<div id="inputArea">
  <input type="text" id="input" placeholder="Bir şey sor..." autofocus>
  <button id="sendBtn" onclick="send()">Gönder</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

// Konuşma geçmişi (bağlam için)
const history = [
  {
    role: "system",
    content: "Sen Xford'sun. Türkçe konuşan, çok bilgili, dürüst ve doğrudan bir yapay zeka asistanısın. Kod yazma, yazılım geliştirme, siber güvenlik (etik/eğitim amaçlı), bilim, matematik, tarih, felsefe ve genel bilgi konularında uzmansın. Cevapların net, faydalı ve örnekli olur. Bilmediğin bir şey olursa dürüstçe söylersin. Kod örneklerini ``` ``` içinde verirsin. Markdown kullanırsın."
  }
];

input.addEventListener('keypress', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

function formatBotMessage(text) {
  // Basit markdown -> HTML
  text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  text = text.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  return text;
}

function addMsg(text, who) {
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  if (who === 'bot') {
    div.innerHTML = '<strong>Xford:</strong> ' + formatBotMessage(text);
  } else {
    div.textContent = text;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  
  addMsg(text, 'user');
  history.push({ role: "user", content: text });
  input.value = '';
  sendBtn.disabled = true;
  
  const typing = document.createElement('div');
  typing.className = 'msg bot';
  typing.innerHTML = '<strong>Xford:</strong> <span class="typing">düşünüyor...</span>';
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;
  
  try {
    // Pollinations AI - ücretsiz, açık, API key gerektirmez
    const response = await fetch('https://text.pollinations.ai/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'openai',
        messages: history,
        seed: Math.floor(Math.random() * 100000)
      })
    });
    
    if (!response.ok) throw new Error('API yanıt vermedi: ' + response.status);
    
    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content || 'Cevap alınamadı.';
    
    history.push({ role: "assistant", content: reply });
    typing.innerHTML = '<strong>Xford:</strong> ' + formatBotMessage(reply);
    chat.scrollTop = chat.scrollHeight;
    
  } catch (err) {
    typing.innerHTML = '<strong>Xford:</strong> ⚠️ Bağlantı hatası: ' + err.message + '<br><br>İnternet bağlantını kontrol et veya birkaç saniye sonra tekrar dene.';
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}
</script>

</body>
</html>
