<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bulut Macerası ⛅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
            touch-action: none;
            user-select: none;
            position: fixed;
            top: 0;
            left: 0;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        #startScreen, #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, rgba(135,206,235,0.95), rgba(176,224,230,0.95));
            z-index: 100;
        }

        #gameOverScreen {
            display: none;
        }

        .title {
            font-size: 40px;
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 15px;
            color: #fff;
            margin-bottom: 25px;
            text-align: center;
            padding: 0 20px;
            line-height: 1.6;
        }

        .btn {
            padding: 15px 40px;
            font-size: 22px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,165,0,0.4);
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.95);
        }

        #scoreDisplay {
            position: fixed;
            top: 10px;
            right: 15px;
            font-size: 26px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 50;
            font-weight: bold;
        }

        #levelDisplay {
            position: fixed;
            top: 42px;
            right: 15px;
            font-size: 13px;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 50;
            font-weight: bold;
        }

        #speedDisplay {
            position: fixed;
            top: 62px;
            right: 15px;
            font-size: 12px;
            color: #FF6347;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 50;
            font-weight: bold;
        }

        #boostBtn {
            position: fixed;
            bottom: 25px;
            right: 15px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 3px solid #FFD700;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            cursor: pointer;
            z-index: 50;
            display: none;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        #boostBtn:active {
            transform: scale(0.9);
        }

        #boostBtn .lightning {
            font-size: 32px;
            filter: drop-shadow(0 0 8px #FFD700);
        }

        #boostBar {
            position: fixed;
            bottom: 100px;
            right: 22px;
            width: 50px;
            height: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
            z-index: 50;
            display: none;
        }

        #boostBarFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            border-radius: 3px;
            transition: width 0.1s;
        }

        .newAnimalPopup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 22px;
            color: #FFD700;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
            z-index: 80;
            animation: popIn 2.5s forwards;
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
            background: rgba(0,0,0,0.5);
            padding: 12px 25px;
            border-radius: 15px;
        }

        .speedPopup {
            position: fixed;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #FF6347;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
            z-index: 80;
            animation: popIn 2s forwards;
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 15px;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(1); }
        }

        #finalScore {
            font-size: 32px;
            color: white;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #highScoreDisplay {
            font-size: 20px;
            color: #FFD700;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="scoreDisplay">0</div>
<div id="levelDisplay"></div>
<div id="speedDisplay"></div>

<div id="boostBtn" ontouchstart="activateBoost(event)" onmousedown="activateBoost(event)">
    <span class="lightning">⚡</span>
</div>
<div id="boostBar"><div id="boostBarFill"></div></div>

<div id="startScreen">
    <div class="title">⛅ Bulut Macerası</div>
    <div class="subtitle">
        Ekrana dokun veya boşluk tuşuna bas!<br>
        ⚡ Şimşek tuşu ile ileriye uç!<br>
        🐦 Her engeli geçince +10 puan<br>
        🔥 Her 200 puanda hız artar!<br>
        🎯 Her 100 puanda yeni düşman eklenir!
    </div>
    <button class="btn" onclick="startGame()">🎮 Oyna</button>
</div>

<div id="gameOverScreen">
    <div class="title">💥 Çarpıştın!</div>
    <div id="finalScore"></div>
    <div id="highScoreDisplay"></div>
    <button class="btn" onclick="startGame()">🔄 Tekrar Oyna</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let cloud, obstacles, particles, bgClouds, score;
let baseSpeed, gameSpeed;
let gameRunning = false, gameStarted = false;
let boostEnergy, boosting, boostTimer;
let highScore = parseInt(localStorage.getItem('cloudHS3')) || 0;
let frameCount = 0;
let currentLevel = 0;
let currentSpeedLevel = 0;
let shownLevels = {};
let shownSpeedLevels = {};
let animFrameId = null;

const GRAVITY = 0.55;
const JUMP_FORCE = -9;
const BOOST_DURATION = 35;
const BOOST_SPEED = 14;
const MAX_BOOST = 100;
const POINTS_PER_PASS = 10;
const SPEED_INCREASE_INTERVAL = 200;
const SPEED_INCREASE_AMOUNT = 0.7;

const animalLevels = [
    { score: 0,   name: "Kuşlar",    emoji: "🐦", type: "bird" },
    { score: 100, name: "Yarasalar", emoji: "🦇", type: "bat" },
    { score: 200, name: "Arılar",    emoji: "🐝", type: "bee" },
    { score: 300, name: "Kartallar", emoji: "🦅", type: "eagle" },
    { score: 400, name: "Ejderhalar",emoji: "🐉", type: "dragon" },
    { score: 500, name: "Uzaylılar", emoji: "👾", type: "alien" },
    { score: 600, name: "Hayaletler",emoji: "👻", type: "ghost" },
    { score: 700, name: "Meteorlar", emoji: "☄️", type: "meteor" },
    { score: 800, name: "Fırtına",   emoji: "🌩️", type: "storm" },
    { score: 900, name: "Anka Kuşu", emoji: "🔥", type: "phoenix" },
];

function getUnlockedLevels(s) {
    let unlocked = [];
    for (let i = 0; i < animalLevels.length; i++) {
        if (s >= animalLevels[i].score) {
            unlocked.push(animalLevels[i]);
        }
    }
    return unlocked;
}

function getLevelIndex(s) {
    let idx = 0;
    for (let i = animalLevels.length - 1; i >= 0; i--) {
        if (s >= animalLevels[i].score) { idx = i; break; }
    }
    return idx;
}

function getSpeedLevel(s) {
    return Math.floor(s / SPEED_INCREASE_INTERVAL);
}

function getObstacleProps(type) {
    let size, extraSpd, sAmp, sFreq;
    switch (type) {
        case "bird":    size = 48; extraSpd = 0;   sAmp = 0;  sFreq = 0; break;
        case "bat":     size = 44; extraSpd = 0.3; sAmp = 40; sFreq = 0.04; break;
        case "bee":     size = 40; extraSpd = 0;   sAmp = 25; sFreq = 0.08; break;
        case "eagle":   size = 52; extraSpd = 0.7; sAmp = 0;  sFreq = 0; break;
        case "dragon":  size = 58; extraSpd = 0.4; sAmp = 50; sFreq = 0.03; break;
        case "alien":   size = 46; extraSpd = 1.0; sAmp = 30; sFreq = 0.06; break;
        case "ghost":   size = 50; extraSpd = 0;   sAmp = 55; sFreq = 0.035; break;
        case "meteor":  size = 44; extraSpd = 1.5; sAmp = 0;  sFreq = 0; break;
        case "storm":   size = 60; extraSpd = 0;   sAmp = 20; sFreq = 0.02; break;
        case "phoenix": size = 54; extraSpd = 0.8; sAmp = 35; sFreq = 0.045; break;
        default:        size = 48; extraSpd = 0;   sAmp = 0;  sFreq = 0;
    }
    return { size, extraSpd, sAmp, sFreq };
}

function initGame() {
    cloud = {
        x: W * 0.18,
        y: H * 0.5,
        w: 60,
        h: 42,
        vy: 0,
        boostVx: 0,
        invincible: 0
    };
    obstacles = [];
    particles = [];
    bgClouds = [];
    score = 0;
    baseSpeed = 3;
    gameSpeed = baseSpeed;
    boostEnergy = MAX_BOOST;
    boosting = false;
    boostTimer = 0;
    frameCount = 0;
    currentLevel = 0;
    currentSpeedLevel = 0;
    shownLevels = {};
    shownSpeedLevels = {};

    for (let i = 0; i < 6; i++) {
        bgClouds.push({
            x: Math.random() * W,
            y: Math.random() * H * 0.75,
            size: 25 + Math.random() * 45,
            speed: 0.2 + Math.random() * 0.5,
            opacity: 0.15 + Math.random() * 0.2
        });
    }

    document.getElementById('scoreDisplay').textContent = '0';
    document.getElementById('levelDisplay').textContent = '';
    document.getElementById('speedDisplay').textContent = '';
}

function startGame() {
    if (animFrameId) cancelAnimationFrame(animFrameId);
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('gameOverScreen').style.display = 'none';
    document.getElementById('boostBtn').style.display = 'flex';
    document.getElementById('boostBar').style.display = 'block';
    initGame();
    gameRunning = true;
    gameStarted = true;
    gameLoop();
}

function jump() {
    if (!gameRunning) return;
    cloud.vy = JUMP_FORCE;
    for (let i = 0; i < 4; i++) {
        particles.push({
            x: cloud.x - 5,
            y: cloud.y + cloud.h / 2,
            vx: -1 - Math.random() * 2,
            vy: Math.random() * 2 - 1,
            life: 16, maxLife: 16,
            color: '255,255,255',
            size: 2 + Math.random() * 3
        });
    }
}

function activateBoost(e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    if (!gameRunning || boostEnergy < 25) return;
    boosting = true;
    boostTimer = BOOST_DURATION;
    boostEnergy -= 25;
    cloud.boostVx = BOOST_SPEED;
    cloud.invincible = BOOST_DURATION;
    cloud.vy = -2;
    for (let i = 0; i < 12; i++) {
        particles.push({
            x: cloud.x - 10,
            y: cloud.y + Math.random() * cloud.h - cloud.h / 2,
            vx: -4 - Math.random() * 8,
            vy: Math.random() * 4 - 2,
            life: 22, maxLife: 22,
            color: '255,215,0',
            size: 3 + Math.random() * 5
        });
    }
}

function spawnObstacle() {
    let unlocked = getUnlockedLevels(score);
    // Rastgele açılmış hayvanlardan birini seç
    let chosen = unlocked[Math.floor(Math.random() * unlocked.length)];

    let props = getObstacleProps(chosen.type);
    let margin = props.size + 10;
    let y = margin + Math.random() * (H - margin * 2);

    obstacles.push({
        x: W + 50,
        y: y,
        baseY: y,
        w: props.size,
        h: props.size,
        emoji: chosen.emoji,
        type: chosen.type,
        extraSpeed: props.extraSpd,
        sineAmp: props.sAmp,
        sineFreq: props.sFreq,
        phase: Math.random() * Math.PI * 2,
        time: 0,
        passed: false
    });
}

function drawCloudChar(x, y, w, h, inv) {
    ctx.save();
    if (inv > 0) {
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 22;
    }

    ctx.fillStyle = '#FFFFFF';
    let cx = x, cy = y;

    // Bulut gövdesi
    ctx.beginPath();
    ctx.ellipse(cx, cy + h * 0.08, w * 0.5, h * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.24, cy - h * 0.14, w * 0.3, h * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + w * 0.2, cy - h * 0.2, w * 0.34, h * 0.34, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx - w * 0.06, cy - h * 0.32, w * 0.24, h * 0.24, 0, 0, Math.PI * 2);
    ctx.fill();

    // Gözler
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx - 8, cy - 1, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 8, cy - 1, 3, 0, Math.PI * 2); ctx.fill();

    // Gülümseme
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.arc(cx, cy + 5, 5.5, 0.1, Math.PI - 0.1);
    ctx.stroke();

    // Yanaklar
    ctx.fillStyle = 'rgba(255,182,193,0.5)';
    ctx.beginPath(); ctx.ellipse(cx - 14, cy + 3, 3.5, 2.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + 14, cy + 3, 3.5, 2.5, 0, 0, Math.PI * 2); ctx.fill();

    // Şemsiye
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx + w * 0.28, cy - h * 0.15);
    ctx.lineTo(cx + w * 0.28, cy - h * 0.75);
    ctx.stroke();
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(cx + w * 0.28, cy - h * 0.75, 14, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#FFA500';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx + w * 0.28, cy - h * 0.75, 14, Math.PI, 0);
    ctx.stroke();

    ctx.restore();
}

function drawBackground() {
    let grad = ctx.createLinearGradient(0, 0, 0, H);
    let li = getLevelIndex(score);
    switch (li) {
        case 0: grad.addColorStop(0, '#87CEEB'); grad.addColorStop(1, '#E0F7FA'); break;
        case 1: grad.addColorStop(0, '#4A6FA5'); grad.addColorStop(1, '#C49B3F'); break;
        case 2: grad.addColorStop(0, '#7EC8E3'); grad.addColorStop(1, '#98D4A1'); break;
        case 3: grad.addColorStop(0, '#5B86E5'); grad.addColorStop(1, '#D4E4FC'); break;
        case 4: grad.addColorStop(0, '#8B2020'); grad.addColorStop(1, '#E05030'); break;
        case 5: grad.addColorStop(0, '#0a0a2e'); grad.addColorStop(1, '#1a1a4e'); break;
        case 6: grad.addColorStop(0, '#1a1a2e'); grad.addColorStop(1, '#3d3d6b'); break;
        case 7: grad.addColorStop(0, '#0d0d1a'); grad.addColorStop(1, '#2d1b4e'); break;
        case 8: grad.addColorStop(0, '#2c3e50'); grad.addColorStop(1, '#4a6741'); break;
        case 9: grad.addColorStop(0, '#cc3300'); grad.addColorStop(1, '#ff8c00'); break;
        default: grad.addColorStop(0, '#87CEEB'); grad.addColorStop(1, '#E0F7FA');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    if (li >= 5 && li <= 7) {
        for (let i = 0; i < 35; i++) {
            let sx = (i * 137 + frameCount * 0.15) % W;
            let sy = (i * 97 + i * 13) % (H * 0.65);
            let a = 0.3 + Math.sin(frameCount * 0.04 + i) * 0.3;
            ctx.fillStyle = `rgba(255,255,255,${a})`;
            ctx.fillRect(sx, sy, 2, 2);
        }
    }

    bgClouds.forEach(c => {
        ctx.fillStyle = `rgba(255,255,255,${c.opacity})`;
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, c.size, c.size * 0.45, 0, 0, Math.PI * 2);
        ctx.fill();
        c.x -= c.speed + gameSpeed * 0.2;
        if (c.x < -c.size * 2) {
            c.x = W + c.size;
            c.y = Math.random() * H * 0.75;
        }
    });
}

function checkCollision(ax, ay, aw, ah, bx, by, bw, bh) {
    let m = 8;
    return ax - aw / 2 + m < bx + bw / 2 - m &&
           ax + aw / 2 - m > bx - bw / 2 + m &&
           ay - ah / 2 + m < by + bh / 2 - m &&
           ay + ah / 2 - m > by - bh / 2 + m;
}

function gameOver() {
    gameRunning = false;
    document.getElementById('boostBtn').style.display = 'none';
    document.getElementById('boostBar').style.display = 'none';

    if (score > highScore) {
        highScore = score;
        localStorage.setItem('cloudHS3', highScore);
    }

    document.getElementById('finalScore').textContent = `Skor: ${score}`;
    document.getElementById('highScoreDisplay').textContent = `🏆 En Yüksek: ${highScore}`;

    for (let i = 0; i < 18; i++) {
        particles.push({
            x: cloud.x, y: cloud.y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            life: 35, maxLife: 35,
            color: '255,100,100',
            size: 4 + Math.random() * 7
        });
    }

    setTimeout(() => {
        document.getElementById('gameOverScreen').style.display = 'flex';
    }, 600);
}

function showPopup(text, className) {
    let el = document.createElement('div');
    el.className = className;
    el.innerHTML = text;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
}

function gameLoop() {
    animFrameId = requestAnimationFrame(gameLoop);

    if (!gameRunning) {
        drawBackground();
        drawCloudChar(cloud.x, cloud.y, cloud.w, cloud.h, 0);
        updateParticles();
        return;
    }

    frameCount++;
    ctx.clearRect(0, 0, W, H);
    drawBackground();

    // Hız
    let spdLvl = getSpeedLevel(score);
    gameSpeed = baseSpeed + spdLvl * SPEED_INCREASE_AMOUNT;
    if (gameSpeed > 12) gameSpeed = 12;

    if (spdLvl > currentSpeedLevel) {
        currentSpeedLevel = spdLvl;
        if (!shownSpeedLevels[spdLvl]) {
            shownSpeedLevels[spdLvl] = true;
            showPopup(`🚀 Hız Arttı! Seviye ${spdLvl + 1}`, 'speedPopup');
        }
    }
    document.getElementById('speedDisplay').textContent = `🚀 Hız: x${spdLvl + 1}`;

    // Boost
    if (boosting) {
        boostTimer--;
        if (boostTimer <= 0) { boosting = false; cloud.boostVx = 0; }
    }
    if (!boosting && boostEnergy < MAX_BOOST) boostEnergy += 0.12;
    document.getElementById('boostBarFill').style.width = (boostEnergy / MAX_BOOST * 100) + '%';
    if (cloud.invincible > 0) cloud.invincible--;

    // Bulut fiziği
    cloud.vy += GRAVITY;
    cloud.y += cloud.vy;

    if (cloud.boostVx > 0) {
        cloud.x += cloud.boostVx;
        cloud.boostVx *= 0.91;
        if (cloud.boostVx < 0.4) cloud.boostVx = 0;
        if (frameCount % 2 === 0) {
            particles.push({
                x: cloud.x - cloud.w / 2,
                y: cloud.y + Math.random() * cloud.h - cloud.h / 2,
                vx: -3 - Math.random() * 4, vy: Math.random() * 2 - 1,
                life: 14, maxLife: 14, color: '255,215,0',
                size: 2 + Math.random() * 4
            });
        }
    }

    // Geri dönüş
    if (!boosting && cloud.x > W * 0.18) {
        cloud.x += (W * 0.18 - cloud.x) * 0.06;
    }

    // ÜST SINIR - yukarı çıkmasın
    if (cloud.y < 0) {
        cloud.y = 0;
        cloud.vy = 0;
    }
    // ALT SINIR - yere düşerse öl
    if (cloud.y > H - cloud.h / 2) {
        cloud.y = H - cloud.h / 2;
        gameOver();
        return;
    }

    // Engel oluştur
    let spawnRate = Math.max(38, 80 - score * 0.02);
    if (frameCount % Math.floor(spawnRate) === 0) {
        spawnObstacle();
    }

    // Engelleri güncelle
    for (let i = obstacles.length - 1; i >= 0; i--) {
        let ob = obstacles[i];
        ob.time++;
        ob.x -= gameSpeed + ob.extraSpeed;
        if (ob.sineAmp > 0) {
            ob.y = ob.baseY + Math.sin(ob.time * ob.sineFreq + ob.phase) * ob.sineAmp;
        }
        // Engel ekran sınırı
        if (ob.y < ob.h / 2) ob.y = ob.h / 2;
        if (ob.y > H - ob.h / 2) ob.y = H - ob.h / 2;

        // Çiz - BÜYÜK VE NET
        ctx.font = ob.w + 'px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.globalAlpha = 1.0;
        ctx.fillText(ob.emoji, ob.x, ob.y);
        ctx.globalAlpha = 1.0;

        // Geçiş puanı
        if (!ob.passed && ob.x + ob.w / 2 < cloud.x - cloud.w / 2) {
            ob.passed = true;
            score += POINTS_PER_PASS;
            document.getElementById('scoreDisplay').textContent = score;

            // +10 yazısı
            particles.push({
                x: cloud.x + 25, y: cloud.y - 30,
                vx: 0.5, vy: -1.8,
                life: 35, maxLife: 35,
                color: '50,255,50',
                size: 0, isText: true, text: '+10'
            });

            // Yeni hayvan kontrolü
            let newLvl = getLevelIndex(score);
            if (newLvl > currentLevel) {
                currentLevel = newLvl;
                if (!shownLevels[currentLevel]) {
                    shownLevels[currentLevel] = true;
                    let al = animalLevels[currentLevel];
                    showPopup(`Yeni Düşman!<br>${al.emoji} ${al.name}`, 'newAnimalPopup');
                }
            }
            let ld = animalLevels[getLevelIndex(score)];
            document.getElementById('levelDisplay').textContent = `${ld.emoji} ${ld.name}`;
        }

        // Çarpışma
        if (cloud.invincible <= 0) {
            if (checkCollision(cloud.x, cloud.y, cloud.w * 0.8, cloud.h * 0.8,
                             ob.x, ob.y, ob.w * 0.55, ob.h * 0.55)) {
                gameOver();
                return;
            }
        }

        if (ob.x < -80) obstacles.splice(i, 1);
    }

    // Bulutu çiz
    drawCloudChar(cloud.x, cloud.y, cloud.w, cloud.h, cloud.invincible);

    updateParticles();
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        let alpha = p.life / p.maxLife;

        if (p.isText) {
            ctx.font = 'bold 18px Arial';
            ctx.fillStyle = `rgba(${p.color},${alpha})`;
            ctx.textAlign = 'center';
            ctx.fillText(p.text, p.x, p.y);
        } else {
            ctx.fillStyle = `rgba(${p.color},${alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * Math.max(alpha, 0.3), 0, Math.PI * 2);
            ctx.fill();
        }

        if (p.life <= 0) particles.splice(i, 1);
    }
}

// Kontroller
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        if (!gameStarted) startGame();
        else jump();
    }
    if (e.code === 'KeyE' || e.code === 'ShiftRight') {
        activateBoost();
    }
});

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    let touch = e.touches[0];
    let btn = document.getElementById('boostBtn');
    let r = btn.getBoundingClientRect();
    if (touch.clientX >= r.left - 10 && touch.clientX <= r.right + 10 &&
        touch.clientY >= r.top - 10 && touch.clientY <= r.bottom + 10) {
        return;
    }
    if (gameRunning) jump();
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
    if (gameRunning) jump();
});

window.addEventListener('orientationchange', () => setTimeout(resize, 150));
</script>
